  /* dreamy bg */

    radial-gradient(circle at 50% 30%, #ffd6e8 0%, #ff9ac2 45%, #ff4d88 100%);

/* soft sparkles */
body::before{
  content:"";
  position:absolute; inset:0;
  background:
    radial-gradient(circle, rgba(255,255,255,0.15) 2px, transparent 2px);
  background-size:60px 60px;
  opacity:.3;

*{position:relative; z-index:2;}

/* top UI */
#topBar{
  display:flex;
  justify-content:space-between;
  padding:12px;
}

.pill{
  background:rgba(255,255,255,0.25);
  padding:8px 14px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  font-size:14px;
}

#title{ text-align:center; font-size:18px; }
#subtitle{ text-align:center; font-size:12px; opacity:.9; }

/* heart */
#heartWrap{
  position:absolute;
  top:45%; left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:180px;
  animation:pulse 2.5s infinite;
}

@keyframes pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.07);}
}

#heartWrap svg{
  width:100%; height:100%;
  filter:
    drop-shadow(0 0 30px rgba(255,0,100,0.7))
    drop-shadow(0 0 60px rgba(255,0,120,0.5));
}

#heartText{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:26px;
  font-weight:bold;
  text-shadow:0 0 12px rgba(255,255,255,0.8);
}

/* pedestal */
#stage{
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(#fff2f7,#ffc0da);
  box-shadow:
    0 15px 40px rgba(0,0,0,0.25),
    inset 0 4px 12px rgba(255,255,255,0.8);
}

/* button */
#startBtn{
  position:absolute;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  border-radius:20px;
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(10px);
  cursor:pointer;
}

/* message */
#msgBox{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);
  text-align:center;
  font-size:13px;
}

/* falling hearts */
.heart{
  position:absolute;
  font-size:18px;
  animation:fall 6s linear;
  cursor:pointer;
}

@keyframes fall{
  from{top:-10%;}
  to{top:110%;}
}

/* final */
#finalChoice{
  display:none;
  position:absolute;
  bottom:30px;
  width:100%;
  text-align:center;
}

#finalChoice div{
  width:85%;
  margin:auto;
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(10px);
}

button{
  margin:5px;
  padding:8px 18px;
  border-radius:18px;
  border:none;
  cursor:pointer;
}

<body>

<div id="topBar">
  <div class="pill">❤️ <span id="score">0</span></div>
  <div class="pill">⏳ <span id="time">30</span></div>
</div>

<div id="title">💗 Kirti… just 30 seconds?</div>
<div id="subtitle">Click the hearts to read something from my heart 💗</div>

<div id="heartWrap">
  <svg viewBox="0 0 100 90">
    <defs>
      <radialGradient id="g" cx="50%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#ff7aa8"/>
        <stop offset="100%" stop-color="#ff2a75"/>
      </radialGradient>
    </defs>
    <path d="M50 80 L10 40 A20 20 0 1 1 50 20 A20 20 0 1 1 90 40 Z"
          fill="url(#g)"/>
  </svg>
  <div id="heartText">Kirti</div>
</div>

<div id="stage"></div>

<div id="startBtn" onclick="startGame()">Click Hearts 💗</div>

<div id="msgBox">
Find all the hearts and read what I want to say to you… <br>
<b>All of it is for you, Kirti 💗</b>
</div>

<div id="finalChoice">
  <div>
    <p>So… would you like to date me seriously? ❤️</p>
    <button onclick="accept()">Yes 😊</button>
    <button onclick="accept()">No 😤</button>
  </div>
</div>

<script>
let messages=[
"Kirti… you’re genuinely special to me ❤️",
"I like knowing youuu…",
"I want to take care of you",
"I want to understand you the way you even don't",
"I want to be there for you in small ways",
"I’ve never been someone who puts effort like this",
"I’ve never held bags for someone… never done 'ye lana wo lana'",
"But with you… I actually enjoy doing all that",
"I like taking care of you… genuinely",
"And yeah… I’m trying, if I fail you need to teach me",
"Even making this… is me trying",
"I just want you to trust me ❤️",
"Very cheesy but yeah 😅"
];

let score=0,time=30,started=false;

function startGame(){
 if(started)return;
 started=true;

 setInterval(createHeart,1200);

 let t=setInterval(()=>{
  time--;
  document.getElementById("time").innerText=time;
  if(time<=0){clearInterval(t);showFinal();}
 },1000);
}

function createHeart(){
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*90+"%";

 h.onclick=()=>{
  if(score<messages.length){
   document.getElementById("msgBox").innerText=messages[score];
  }
  score++;
  document.getElementById("score").innerText=score;
  h.remove();
  if(score===messages.length)showFinal();
 };

 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
}

function showFinal(){
 document.getElementById("msgBox").style.display="none";
 document.getElementById("finalChoice").style.display="block";
}

function accept(){
 document.getElementById("finalChoice").innerHTML=
 "<h2>Hehe… I knew it ❤️</h2>";
}
</script>

</body>
</html>
