<!DOCTYPE html>

<html>
<head>
  <title>Kirti ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      background: radial-gradient(circle at center, #ffc1da, #ff8fb8, #ff4d88);
      color: white;
    }

    /* TOP UI */
    #topBar {
      position: absolute;
      width: 100%;
      top: 10px;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .box {
      background: rgba(255,255,255,0.2);
      padding: 10px 18px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      font-size: 16px;
    }

    /* TITLE */
    #title {
      position: absolute;
      width: 100%;
      top: 70px;
      text-align: center;
      font-size: 22px;
      font-weight: 500;
    }

    #subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
      margin-top: 5px;
    }

    /* BIG HEART */
    #centerHeart {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 140px;
      color: #ff2a75;
      text-shadow: 0 0 40px rgba(255,0,100,0.8);
      animation: pulse 2.5s infinite;
    }

    #centerHeart span {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: bold;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.08); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* CLICK BUTTON */
    #startBtn {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.25);
      padding: 12px 25px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    /* MESSAGE BOX */
    #msgBox {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      background: rgba(255,255,255,0.25);
      padding: 15px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      text-align: center;
      font-size: 15px;
    }

    /* FLOAT HEARTS */
    .heart {
      position: absolute;
      font-size: 22px;
      animation: fall 6s linear;
      cursor: pointer;
    }

    @keyframes fall {
      from { top: -10%; }
      to { top: 110%; }
    }

  </style>

</head>

<body>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div id="topBar">
  <div class="box">❤️ <span id="score">0</span></div>
  <div class="box">⏳ <span id="time">30</span></div>
</div>

<div id="title">💗 Kirti… just 30 seconds?</div>
<div id="subtitle">Click the hearts to read something from my heart 💗</div>

<div id="centerHeart">❤️<span>Kirti</span></div>

<div id="startBtn" onclick="startGame()">Click Hearts 💗</div>

<div id="msgBox">
Find all the hearts and read what I want to say to you… <br>
<b>All of it is for you, Kirti 💗</b>
</div>

<script>
let messages = [
"Kirti… you’re genuinely special to me ❤️",
"I like knowing youuu…",
"I want to take care of you",
"I want to understand you the way you even don't",
"I want to be there for you in small ways",

"I’ve never been someone who puts effort like this",
"I’ve never held bags for someone… never done 'ye lana wo lana'",

"But with you… I actually enjoy doing all that",
"I like taking care of you… genuinely",

"And yeah… I’m trying, if I fail you need to teach me, and that goes vice versa",
"Even making this… is me trying",

"I just want you to trust me a little regardless of that past ❤️, as I am trying too.....",
"Finally please don't show this to amu or anyone, very cheesy it is 😅"
];

let score = 0;
let time = 30;
let started = false;

function startGame() {
  if (started) return;
  started = true;

  document.getElementById("music").play();

  setInterval(createHeart, 1200); // slower spawn

  let timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
      clearInterval(timer);
      document.getElementById("msgBox").innerHTML =
      "I’m not perfect… but I’m being real. I don’t want to mess this up ❤️";
    }
  }, 1000);
}

function createHeart() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = Math.random() > 0.5 ? "❤️" : "Kirti";

  heart.style.left = Math.random()*90 + "%";

  heart.onclick = () => {
    if (score < messages.length) {
      document.getElementById("msgBox").innerText = messages[score];
    }
    score++;
    document.getElementById("score").innerText = score;
    heart.remove();
  };

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
</script>

</body>
</html>
