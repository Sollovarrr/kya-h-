<!DOCTYPE html>

<html>
<head>
  <title>Kirti ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
      color: white;
      background: linear-gradient(#ff9ac2, #ff4d88);
    }

    #topBar {
      display: flex;
      justify-content: space-between;
      padding: 10px 15px;
      font-size: 14px;
    }

    /* HEART */
    #heart {
      font-size: 120px;
      margin-top: 60px;
      animation: pulse 1.5s infinite;
    }

    #heartText {
      margin-top: -40px;
      font-size: 24px;
      font-weight: bold;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* BUTTON */
    #startBtn {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 20px;
      background: white;
      color: #ff4d88;
      display: inline-block;
      cursor: pointer;
    }

    /* MESSAGE */
    #msgBox {
      position: fixed;
      bottom: 20px;
      width: 90%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.2);
      padding: 12px;
      border-radius: 15px;
      font-size: 14px;
    }

    /* FALLING HEARTS */
    .heartDrop {
      position: absolute;
      font-size: 20px;
      animation: fall 5s linear;
      cursor: pointer;
    }

    @keyframes fall {
      from { top: -10%; }
      to { top: 100%; }
    }

    #finalChoice {
      display: none;
      position: fixed;
      bottom: 40px;
      width: 100%;
      text-align: center;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
    }

  </style>

</head>

<body>

<div id="topBar">
  <div>❤️ <span id="score">0</span></div>
  <div>⏳ <span id="time">30</span></div>
</div>

<div id="heart">❤️</div>
<div id="heartText">Kirti</div>

<div id="startBtn" onclick="startGame()">Click Hearts 💗</div>

<div id="msgBox">
All of it is for you, Kirti 💗
</div>

<div id="finalChoice">
  <p>Would you like to date me seriously? ❤️</p>
  <button onclick="accept()">Yes 😊</button>
  <button onclick="accept()">No 😤</button>
</div>

<script>
let messages = [
"Kirti… you’re genuinely special to me ❤️",
"I like knowing youuu…",
"I want to take care of you",
"I want to understand you the way you even don't",
"I want to be there for you in small ways",
"I’ve never been someone who puts effort like this",
"I’ve never held bags for someone… never done 'ye lana wo lana'",
"But with you… I actually enjoy doing all that",
"I like taking care of you… genuinely",
"And yeah… I’m trying, if I fail you need to teach me",
"Even making this… is me trying",
"I just want you to trust me ❤️",
"Very cheesy but yeah 😅"
];

let score = 0;
let time = 30;
let started = false;

function startGame() {
  if (started) return;
  started = true;

  setInterval(createHeart, 800);

  let timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
      clearInterval(timer);
      showFinal();
    }
  }, 1000);
}

function createHeart() {
  let h = document.createElement("div");
  h.className = "heartDrop";
  h.innerHTML = "❤️";
  h.style.left = Math.random()*90 + "%";

  h.onclick = () => {
    if (score < messages.length) {
      document.getElementById("msgBox").innerText = messages[score];
    }
    score++;
    document.getElementById("score").innerText = score;
    h.remove();

    if (score === messages.length) showFinal();
  };

  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}

function showFinal() {
  document.getElementById("msgBox").style.display = "none";
  document.getElementById("finalChoice").style.display = "block";
}

function accept() {
  document.getElementById("finalChoice").innerHTML =
  "<h2>Hehe… I knew it ❤️</h2>";
}
</script>

</body>
</html>
