<!DOCTYPE html>

<html>
<head>
  <title>Kirti ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      color: white;
      background: radial-gradient(circle at center, #ffd1e6 0%, #ff9ac2 40%, #ff4d88 100%);
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
    }

    * { position: relative; z-index: 2; }

    /* TOP BAR */
    #topBar {
      display: flex;
      justify-content: space-between;
      padding: 12px 15px;
    }

    .box {
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(15px);
      padding: 8px 14px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    /* TITLE */
    #title {
      text-align: center;
      font-size: 20px;
      margin-top: 5px;
    }

    #subtitle {
      text-align: center;
      font-size: 13px;
      opacity: 0.9;
    }

    /* HEART */
    #centerHeart {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px;
      color: #ff2a75;
      text-shadow:
        0 0 20px rgba(255,255,255,0.6),
        0 0 40px rgba(255,0,100,0.9),
        0 0 60px rgba(255,0,100,0.6);
      animation: pulse 2.2s infinite;
    }

    #centerHeart span {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: bold;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.08); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* BUTTON */
    #startBtn {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.3);
      padding: 12px 25px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    /* MESSAGE BOX */
    #msgBox {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      background: rgba(255,255,255,0.25);
      padding: 15px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      text-align: center;
      font-size: 14px;
    }

    /* HEARTS */
    .heart {
      position: absolute;
      font-size: 20px;
      animation: fall 6s linear;
      cursor: pointer;
    }

    @keyframes fall {
      from { top: -10%; }
      to { top: 110%; }
    }

    /* FINAL */
    #finalChoice {
      display: none;
      position: absolute;
      bottom: 40px;
      width: 100%;
      text-align: center;
    }

    #finalChoice div {
      background: rgba(255,255,255,0.3);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      width: 85%;
      margin: auto;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }

  </style>

</head>

<body>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div id="topBar">
  <div class="box">❤️ <span id="score">0</span></div>
  <div class="box">⏳ <span id="time">30</span></div>
</div>

<div id="title">💗 Kirti… just 30 seconds?</div>
<div id="subtitle">Click the hearts to read something from my heart 💗</div>

<div id="centerHeart">❤️<span>Kirti</span></div>

<div id="startBtn" onclick="startGame()">Click Hearts 💗</div>

<div id="msgBox">
Find all the hearts and read what I want to say to you… <br>
<b>All of it is for you, Kirti 💗</b>
</div>

<div id="finalChoice">
  <div>
    <p>So… would you like to date me seriously? ❤️</p>
    <button onclick="accept()">Yes 😊</button>
    <button onclick="accept()">No 😤</button>
  </div>
</div>

<script>
let messages = [
"Kirti… you’re genuinely special to me ❤️",
"I like knowing youuu…",
"I want to take care of you",
"I want to understand you the way you even don't",
"I want to be there for you in small ways",
"I’ve never been someone who puts effort like this",
"I’ve never held bags for someone… never done 'ye lana wo lana'",
"But with you… I actually enjoy doing all that",
"I like taking care of you… genuinely",
"And yeah… I’m trying, if I fail you need to teach me, and that goes vice versa",
"Even making this… is me trying",
"I just want you to trust me a little regardless of that past ❤️, as I am trying too.....",
"Finally please don't show this to amu or anyone, very cheesy it is 😅"
];

let score = 0;
let time = 30;
let started = false;

function startGame() {
  if (started) return;
  started = true;

  document.getElementById("music").play();

  setInterval(createHeart, 1200);

  let timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
      clearInterval(timer);
      showFinal();
    }
  }, 1000);
}

function createHeart() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = Math.random() > 0.5 ? "❤️" : "Kirti";

  heart.style.left = Math.random()*90 + "%";

  heart.onclick = () => {
    if (score < messages.length) {
      document.getElementById("msgBox").innerText = messages[score];
    }
    score++;
    document.getElementById("score").innerText = score;
    heart.remove();

    if (score === messages.length) {
      showFinal();
    }
  };

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}

function showFinal() {
  document.getElementById("msgBox").style.display = "none";
  document.getElementById("finalChoice").style.display = "block";
}

function accept() {
  document.getElementById("finalChoice").innerHTML =
  "<h2>Hehe… I knew it 😌❤️</h2><p>I’ll make it worth it, promise.</p>";
}
</script>

</body>
</html>
