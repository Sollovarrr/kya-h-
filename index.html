<!DOCTYPE html>

<html>
<head>
  <title>Kirti ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at center, #ffd6e8, #ff99c8, #ff4d88);
      overflow: hidden;
      text-align: center;
    }

    #start, #end {
      position: absolute;
      width: 100%;
      top: 40%;
      color: white;
      z-index: 5;
    }

    button {
      padding: 12px 24px;
      border: none;
      background: white;
      color: #ff4d88;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #game { display: none; }

    /* BIG GLOWING HEART */
    #centerHeart {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 140px;
      color: #ff1a66;
      text-shadow: 0 0 30px rgba(255,0,100,0.8);
      animation: pulse 1.5s infinite;
      opacity: 0.95;
    }

    #centerHeart span {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      color: white;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.1); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* FLOATING HEARTS */
    .heart {
      position: absolute;
      font-size: 26px;
      cursor: pointer;
      animation: fall 4s linear;
      color: white;
      text-shadow: 0 0 8px rgba(255,255,255,0.6);
    }

    @keyframes fall {
      from { top: -10%; }
      to { top: 100%; }
    }

    #msg {
      position: absolute;
      bottom: 20%;
      width: 100%;
      font-size: 20px;
      color: white;
      padding: 0 20px;
      font-weight: 500;
      text-shadow: 0 0 8px rgba(0,0,0,0.3);
    }

    #score {
      position: absolute;
      top: 15px;
      left: 15px;
      color: white;
      font-size: 18px;
    }

    #timer {
      position: absolute;
      top: 15px;
      right: 15px;
      color: white;
      font-size: 18px;
    }

  </style>

</head>

<body>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div id="start">
  <h2>Kirti… just 30 seconds? 🥺</h2>
  <button onclick="startGame()">Start</button>
</div>

<div id="game">
  <div id="score">❤️ 0</div>
  <div id="timer">⏳ 30</div>
  <div id="msg"></div>

  <!-- BIG CENTER HEART -->

  <div id="centerHeart">❤️<span>Kirti</span></div>
</div>

<div id="end" style="display:none;">
  <h2>Siddharth → Kirti ❤️</h2>
  <p id="final"></p>
  <button onclick="location.reload()">Again?</button>
</div>

<script>
let messages = [
"Kirti… you’re genuinely special to me ❤️",
"I like knowing youuu…",
"I want to take care of you",
"I want to understand you the way you even don't",
"I want to be there for you in small ways",

"I’ve never been someone who puts effort like this",
"I’ve never held bags for someone… never done 'ye lana wo lana'",

"But with you… I actually enjoy doing all that",
"I like taking care of you… genuinely",

"And yeah… I’m trying, if I fail you need to teach me, and that goes vice versa",
"Even making this… is me trying",

"I just want you to trust me a little regardless of that past❤️, as I am trying too.....",
"Finally please don't show this to amu or anyone, very cheesy it is"
];

let score = 0;
let time = 30;

function startGame() {
  document.getElementById("start").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("music").play();

  let gameInterval = setInterval(createHeart, 700);

  let timerInterval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "⏳ " + time;

    if (time <= 0) {
      clearInterval(timerInterval);
      clearInterval(gameInterval);
      endGame();
    }
  }, 1000);
}

function createHeart() {
  let heart = document.createElement("div");
  heart.className = "heart";

  heart.innerHTML = Math.random() > 0.5 ? "❤️" : "Kirti ❤️";
  heart.style.left = Math.random()*90 + "%";

  heart.onclick = () => {
    if (score < messages.length) {
      document.getElementById("msg").innerText = messages[score];
    }
    score++;
    document.getElementById("score").innerText = "❤️ " + score;
    heart.remove();
  };

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 4000);
}

function endGame() {
  document.getElementById("game").style.display = "none";
  document.getElementById("end").style.display = "block";

  document.getElementById("final").innerText =
  "I’m not perfect… but I’m being real. I don’t want to mess this up. Just give me a chance… ❤️";
}
</script>

</body>
</html>
